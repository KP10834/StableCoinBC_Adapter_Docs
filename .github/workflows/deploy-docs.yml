name: Deploy AsyncAPI Docs

on:
  push:
    branches: [main]
    paths:
      - "asyncapi.yaml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Generate HTML from AsyncAPI
        run: |
          docker run --rm -v ${{ github.workspace }}:/app -w /app \
            asyncapi/cli generate fromTemplate asyncapi.yaml \
            @asyncapi/html-template -o docs --force-write

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
